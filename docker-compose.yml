services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  spark:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecommerce-spark:3.5.1
    container_name: spark
    user: root
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark/scripts:/opt/spark/scripts
      - ./data/raw:/opt/spark/raw
      - ./data/processed:/opt/spark/processed
      - ./data/kafka_output:/opt/spark/data/kafka_output
    environment:
      SPARK_MASTER: ${SPARK_MASTER}
      RAW_DATA_PATH: ${RAW_DATA_PATH}
      PARQUET_PATH: ${PARQUET_PATH}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KAFKA_OUTPUT_PATH: ${KAFKA_OUTPUT_PATH}
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecommerce-spark:3.5.1
    container_name: spark-worker
    user: root
    depends_on:
      - spark
    environment:
      SPARK_MASTER: ${SPARK_MASTER}
    volumes:
      - ./data/raw:/opt/spark/raw
      - ./data/processed:/opt/spark/processed
      - ./data/kafka_output:/opt/spark/data/kafka_output
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark:7077

  airflow:
    image: apache/airflow:2.8.4
    container_name: airflow
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: standalone

volumes:
  postgres_data:
  minio_data: